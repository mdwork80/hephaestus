name: Release (publish + sign)

# Publishes the container image to GitHub Container Registry (GHCR) and signs it
# with cosign keyless (Sigstore OIDC — no keys, no secrets). Triggered on pushes
# to main (image tagged :sha-<short>) and on semver tags (tagged :<version> and
# :latest).
#
# For each image, all keyless via the GitHub Actions OIDC token and logged to the
# Rekor transparency log, this workflow produces:
#   - a cosign signature over the image digest,
#   - a cosign CycloneDX SBOM attestation,
#   - a signed SLSA build-provenance attestation.
#
# Verify any published image locally (replace <owner>/<repo> and the digest):
#   cosign verify \
#     --certificate-identity-regexp \
#       "^https://github.com/<owner>/<repo>/.github/workflows/release.yml@" \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     ghcr.io/<owner>/<repo>@sha256:<digest>
# The Deploy workflow runs this verification automatically before deploying.
#
# GHCR visibility: packages are private by default. For a runtime (e.g. Azure
# Container Apps) to pull the image, either make the package public, or grant the
# deploying identity pull access and wire registry credentials. See DEPLOYMENT.md.

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write   # push image + cosign signature/attestations to GHCR
  id-token: write   # OIDC token for cosign keyless signing and attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish + sign image
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        # Audit mode: reports outbound calls without blocking. This job
        # legitimately reaches GHCR and the Sigstore services (Fulcio, Rekor,
        # the TUF CDN). See SECURITY.md for the endpoint list when promoting to
        # egress-policy: block.
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0  # v6.0.3

      - name: Resolve lowercase image name
        # GHCR requires a lowercase repository path; github.repository may contain
        # uppercase characters.
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep a single-manifest image (plain digest) so the signature, the
          # attestations, and the runtime pull all target the same digest.
          # Provenance is attested below with cosign (all-Sigstore, works on
          # private repos — unlike GitHub's attestations API).
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Attest SBOM (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "${IMAGE}@${DIGEST}"

      - name: Build SLSA provenance predicate
        # All-Sigstore provenance (attested with cosign below) instead of the
        # GitHub attestations API, which is unavailable on user-owned private
        # repositories. Records the builder, source, and run identity (SLSA v0.2).
        run: |
          cat > provenance.json <<EOF
          {
            "builder": { "id": "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}" },
            "buildType": "https://github.com/actions/runner/github-hosted",
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${GITHUB_REPOSITORY}@${GITHUB_REF}",
                "digest": { "sha1": "${GITHUB_SHA}" },
                "entryPoint": ".github/workflows/release.yml"
              },
              "environment": {
                "github_run_id": "${GITHUB_RUN_ID}",
                "github_run_attempt": "${GITHUB_RUN_ATTEMPT}",
                "github_actor": "${GITHUB_ACTOR}"
              }
            },
            "metadata": {
              "buildInvocationId": "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
              "completeness": { "parameters": true, "environment": false, "materials": false },
              "reproducible": false
            },
            "materials": [
              { "uri": "git+https://github.com/${GITHUB_REPOSITORY}@${GITHUB_REF}", "digest": { "sha1": "${GITHUB_SHA}" } }
            ]
          }
          EOF
          cat provenance.json

      - name: Attest provenance (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type slsaprovenance --predicate provenance.json "${IMAGE}@${DIGEST}"

      - name: Summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### Published + signed image"
            echo ""
            echo "- Image: \`${IMAGE}@${DIGEST}\`"
            echo "- Tags: \`${{ steps.meta.outputs.tags }}\`"
            echo "- Signature + CycloneDX SBOM + SLSA provenance: cosign keyless (Rekor)"
          } >> "$GITHUB_STEP_SUMMARY"
